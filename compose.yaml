services:

  harrys-site:

    build: .

    container_name: harrys-site 

    restart: unless-stopped

    volumes:
      - .:/app
      - /app/node_modules

    expose:
      - "4321"

    command: npm run dev

  harrys-revproxy:

    image: nginx:latest

    container_name: harrys-revproxy
    
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - harrys-site
